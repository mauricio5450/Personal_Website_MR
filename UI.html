<!DOCTYPE HTML>
<html lang="en-us">
<!--
      With comments make indentations like so
      This way it is easier to find them 
      according to this tutorial:
      https://www.w3schools.com/html/html5_syntax.asp
-->


<head>

   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   
   <title>Home</title>
   <!--
   The is the link to boot strap
   It is good practice to put boot strap
   before my own CSS file
   -->
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">

   <!--The is the link to my CSS file-->
   <link rel="stylesheet" href="UI-style.css">


</head>

<body>
   <!----------------------Navbar-Items-Beginning-------------------------->
   <div id="navbar-placeholder"></div>

   <script>
      fetch("Navbar.html")
         .then(response => response.text())
         .then(data => {
            document.getElementById("navbar-placeholder").innerHTML = data;
            //(Didn't know I could do comments like this)
            //The Javascript code to highlight the link
            
            const links = document.querySelectorAll(".nav-link");
            
            console.log("Links found: ",links);

            const currentPath = window.location.pathname.split("/").pop(); 
            console.log("This is our current path",currentPath);

            links.forEach(link => {
               const href = link.getAttribute("href");
               
               console.log("Checking:",href)

               if (href === currentPath ){
                  console.log("MATCH",href);
                  link.classList.add("active")
               }
            });

         })
         .catch(error => console.error("Error Loading Navbar", error)); 
   </script>   
   <!----------------------Navbar-Items-Ending-------------------------->



   <!--This is a refrence to bootstrap CSS code-->
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>


   
</body>

</html>
